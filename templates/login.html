<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Login</h1>

    {% if error %}
        <div style="
            background:#ffe5e5;
            color:#b00020;
            padding:10px;
            border-radius:6px;
            margin-bottom:15px;
            text-align:center;
            font-weight:bold;
        ">
            {{ error }}
        </div>
    {% endif %}

    <!-- Login Form -->
    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit" style="width:100%;">Login</button>
    </form>
<a href="/login/google">
    <button>Login with Google</button>
</a>
    <!-- Signup Button with narrower spacing -->
    <a href="/signup" style="display:block; margin-top:1px;">
        <button type="button" style="width:100%;">Sign Up</button>
    </a>

    
</div>

</body>
</html>
